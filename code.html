<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>动态口令生成器</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #101620;
        --panel: #151d29;
        --panel-2: #1b2533;
        --line: #2c3a4d;
        --line-strong: #45566b;
        --text: #edf4ff;
        --muted: #a9b8cb;
        --blue: #76b4ff;
        --green: #41c98b;
        --amber: #f1b84b;
        --red: #f06f66;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        background:
          radial-gradient(circle at 50% -10%, rgba(118, 180, 255, 0.22), transparent 36%),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(560px, 100%);
        margin: 0 auto;
        padding: 22px 16px 34px;
      }

      header {
        padding: 12px 0 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: color-mix(in srgb, var(--panel) 94%, transparent);
        padding: 16px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.24);
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field span,
      .check {
        color: var(--muted);
        font-weight: 700;
        font-size: 14px;
      }

      input {
        width: 100%;
        height: 48px;
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        background: #0f1724;
        color: var(--text);
        padding: 0 12px;
        font: inherit;
      }

      input:focus {
        outline: 0;
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(118, 180, 255, 0.14);
      }

      .check {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .check input {
        width: 18px;
        height: 18px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        min-height: 46px;
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
        font-weight: 800;
      }

      button.primary {
        border-color: #1f4e79;
        background: linear-gradient(135deg, #1f4e79, #0f766e);
        color: #fff;
      }

      .grid {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .card {
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        background: var(--panel-2);
        padding: 16px;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .site {
        color: var(--muted);
        font-weight: 900;
      }

      .copy {
        min-height: 34px;
        padding: 0 10px;
        font-size: 13px;
      }

      .code {
        margin-top: 8px;
        font-size: clamp(36px, 14vw, 58px);
        font-weight: 950;
        letter-spacing: 0.12em;
        line-height: 1;
      }

      .timer {
        margin-top: 14px;
        color: var(--amber);
        font-weight: 900;
      }

      .bar {
        margin-top: 10px;
        height: 9px;
        border-radius: 999px;
        overflow: hidden;
        background: #0f1724;
        border: 1px solid var(--line);
      }

      .bar span {
        display: block;
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--green), var(--amber));
      }

      .status {
        min-height: 24px;
        margin-top: 12px;
        color: var(--red);
        font-weight: 800;
      }

      .note {
        margin-top: 14px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>动态口令生成器</h1>
        <p>输入你的 ACCESS_SECRET 后生成 MG / MY 当前 5 分钟口令。密钥只在本机浏览器使用，不会上传。</p>
      </header>

      <section class="panel">
        <label class="field">
          <span>ACCESS_SECRET</span>
          <input id="secretInput" type="password" autocomplete="off" placeholder="输入你的 Cloudflare ACCESS_SECRET" />
        </label>
        <label class="check">
          <input id="rememberInput" type="checkbox" />
          <span>保存在这台手机浏览器里</span>
        </label>
        <div class="actions">
          <button class="primary" id="generateButton" type="button">生成口令</button>
          <button id="clearButton" type="button">清除密钥</button>
        </div>
        <div class="status" id="status"></div>
      </section>

      <section class="grid">
        <article class="card">
          <div class="card-head">
            <div class="site">MG 毛概</div>
            <button class="copy" data-copy="mgCode" type="button">复制</button>
          </div>
          <div class="code" id="mgCode">------</div>
        </article>
        <article class="card">
          <div class="card-head">
            <div class="site">MY 马原</div>
            <button class="copy" data-copy="myCode" type="button">复制</button>
          </div>
          <div class="code" id="myCode">------</div>
        </article>
      </section>

      <div class="timer" id="timer">剩余 -- 秒</div>
      <div class="bar"><span id="bar"></span></div>
      <p class="note">不要把 ACCESS_SECRET 发给别人。别人只需要当前 6 位口令，不需要密钥。</p>
    </main>

    <script>
      const WINDOW_SECONDS = 300;
      const STORE_KEY = "habaDynamicCodeSecret:v1";

      const els = {
        secretInput: document.querySelector("#secretInput"),
        rememberInput: document.querySelector("#rememberInput"),
        generateButton: document.querySelector("#generateButton"),
        clearButton: document.querySelector("#clearButton"),
        status: document.querySelector("#status"),
        mgCode: document.querySelector("#mgCode"),
        myCode: document.querySelector("#myCode"),
        timer: document.querySelector("#timer"),
        bar: document.querySelector("#bar"),
      };

      let activeSecret = localStorage.getItem(STORE_KEY) || "";

      if (activeSecret) {
        els.secretInput.value = activeSecret;
        els.rememberInput.checked = true;
      }

      els.generateButton.addEventListener("click", () => {
        const value = els.secretInput.value.trim();
        if (!value) {
          showStatus("请先输入 ACCESS_SECRET");
          return;
        }
        activeSecret = value;
        if (els.rememberInput.checked) localStorage.setItem(STORE_KEY, activeSecret);
        else localStorage.removeItem(STORE_KEY);
        showStatus("");
        update();
      });

      els.clearButton.addEventListener("click", () => {
        activeSecret = "";
        els.secretInput.value = "";
        els.rememberInput.checked = false;
        localStorage.removeItem(STORE_KEY);
        els.mgCode.textContent = "------";
        els.myCode.textContent = "------";
        showStatus("已清除");
      });

      document.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", async () => {
          const value = document.querySelector(`#${button.dataset.copy}`).textContent;
          if (!/^\d{6}$/.test(value)) return;
          await navigator.clipboard.writeText(value);
          showStatus(`已复制 ${value}`);
        });
      });

      function showStatus(text) {
        els.status.textContent = text;
      }

      async function makeCode(secret, site, slot) {
        const key = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(secret),
          { name: "HMAC", hash: "SHA-256" },
          false,
          ["sign"],
        );
        const signature = await crypto.subtle.sign(
          "HMAC",
          key,
          new TextEncoder().encode(`${site}:${slot}`),
        );
        const bytes = new Uint8Array(signature);
        const offset = bytes[bytes.length - 1] & 15;
        const binary =
          ((bytes[offset] & 127) << 24) |
          ((bytes[offset + 1] & 255) << 16) |
          ((bytes[offset + 2] & 255) << 8) |
          (bytes[offset + 3] & 255);
        return String(binary % 1000000).padStart(6, "0");
      }

      async function update() {
        const now = Math.floor(Date.now() / 1000);
        const slot = Math.floor(now / WINDOW_SECONDS);
        const remaining = WINDOW_SECONDS - (now % WINDOW_SECONDS);
        els.timer.textContent = `剩余 ${remaining} 秒`;
        els.bar.style.width = `${(remaining / WINDOW_SECONDS) * 100}%`;
        if (!activeSecret) return;
        els.mgCode.textContent = await makeCode(activeSecret, "MG", slot);
        els.myCode.textContent = await makeCode(activeSecret, "MY", slot);
      }

      update();
      setInterval(update, 1000);
    </script>
  </body>
</html>
