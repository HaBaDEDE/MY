<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>马原题库练习</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">✓</div>
          <div>
            <h1>马原题库练习</h1>
            <p id="bankMeta">500 题</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="sponsor-button" id="sponsorButton" type="button">
            <span aria-hidden="true">♥</span>
            <span>赞助</span>
          </button>
          <button class="icon-button" id="themeButton" type="button" title="切换主题" aria-label="切换主题">◐</button>
          <button class="icon-button" id="favoriteButton" type="button" title="收藏当前题" aria-label="收藏当前题">☆</button>
          <button class="text-button" id="resetStorageButton" type="button">清空记录</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="control-panel" aria-label="练习设置">
          <img class="panel-asset" src="assets/study-panel.png" alt="" />

          <section class="control-block">
            <div class="block-title">题型</div>
            <div class="segmented" id="typeControl"></div>
          </section>

          <section class="control-block two-column">
            <label class="field">
              <span>数量</span>
              <select id="countSelect">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="all">全部</option>
                <option value="custom">自定义</option>
              </select>
            </label>
            <label class="field">
              <span>自定义</span>
              <input id="customCount" type="number" min="1" max="500" value="30" disabled />
            </label>
          </section>

          <section class="control-block">
            <div class="block-title">出题</div>
            <div class="segmented compact" id="orderControl">
              <button class="active" type="button" data-order="random">随机</button>
              <button type="button" data-order="sequential">顺序</button>
            </div>
          </section>

          <section class="control-block">
            <div class="block-title">模式</div>
            <div class="segmented compact" id="modeControl">
              <button class="active" type="button" data-mode="practice">练习</button>
              <button type="button" data-mode="exam">考试</button>
            </div>
          </section>

          <section class="control-block">
            <label class="toggle-row">
              <span>
                <strong>答对自动下一题</strong>
                <small>练习模式下答对后自动跳转</small>
              </span>
              <input id="autoNextToggle" type="checkbox" />
            </label>
          </section>

          <button class="primary-button" id="startButton" type="button">开始练习</button>

          <div class="quick-grid">
            <button class="quick-card" id="resumeSessionButton" type="button">
              <span>↩</span>
              <small>继续上次</small>
            </button>
            <button class="quick-card" id="exportStudyButton" type="button">
              <span>↓</span>
              <small>导出资料</small>
            </button>
            <button class="quick-card" id="mistakePracticeButton" type="button">
              <span id="mistakeCount">0</span>
              <small>错题</small>
            </button>
            <button class="quick-card" id="favoritePracticeButton" type="button">
              <span id="favoriteCount">0</span>
              <small>收藏</small>
            </button>
          </div>

          <section class="control-block">
            <label class="field">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="关键词" />
            </label>
          </section>
        </aside>

        <section class="quiz-area" aria-live="polite">
          <div class="session-strip">
            <div class="stat">
              <span id="progressText">0 / 0</span>
              <small>进度</small>
            </div>
            <div class="stat">
              <span id="scoreText">0</span>
              <small>正确</small>
            </div>
            <div class="stat">
              <span id="wrongText">0</span>
              <small>错误</small>
            </div>
            <div class="stat">
              <span id="unansweredText">0</span>
              <small>未答</small>
            </div>
            <div class="stat accent">
              <span id="streakText">0</span>
              <small>连对</small>
            </div>
          </div>
          <div class="progress-rail" aria-hidden="true">
            <span id="progressBar"></span>
          </div>

          <article class="question-panel" id="questionPanel">
            <div class="question-head">
              <div>
                <div class="question-kicker" id="questionKicker">题库</div>
                <h2 id="questionStem">点击“开始练习”生成题目</h2>
              </div>
              <span class="type-pill" id="questionType">全部</span>
            </div>

            <div class="options-list" id="optionsList"></div>

            <div class="feedback" id="feedbackBox" hidden></div>

            <section class="note-box">
              <label for="noteInput">我的笔记</label>
              <textarea id="noteInput" rows="3" placeholder="写下容易混淆的点、记忆口诀或自己的解释"></textarea>
              <div class="note-status" id="noteStatus"></div>
            </section>

            <div class="celebration-layer" id="celebrationLayer" aria-hidden="true"></div>

            <div class="question-actions">
              <button class="text-button" id="prevButton" type="button">上一题</button>
              <button class="text-button" id="clearAnswerButton" type="button">清除</button>
              <button class="primary-button" id="checkButton" type="button">确定</button>
              <button class="text-button" id="nextButton" type="button">下一题</button>
              <button class="danger-button" id="finishButton" type="button">交卷</button>
            </div>
          </article>

          <section class="navigator-panel">
            <div class="navigator-head">
              <span>题号</span>
              <button class="text-button small" id="reviewWrongButton" type="button">只看错题</button>
            </div>
            <div class="question-nav" id="questionNav"></div>
          </section>
        </section>
      </main>
    </div>

    <dialog class="result-dialog" id="resultDialog">
      <div class="result-content">
        <h2>练习结果</h2>
        <div class="result-grid">
          <div><strong id="resultCorrect">0</strong><span>正确</span></div>
          <div><strong id="resultWrong">0</strong><span>错误</span></div>
          <div><strong id="resultRate">0%</strong><span>正确率</span></div>
          <div><strong id="resultStreak">0</strong><span>最佳连对</span></div>
        </div>
        <div class="result-actions">
          <button class="text-button" id="closeResultButton" type="button">继续查看</button>
          <button class="primary-button" id="redoWrongButton" type="button">重练错题</button>
        </div>
      </div>
    </dialog>

    <dialog class="sponsor-dialog" id="sponsorDialog">
      <div class="sponsor-card">
        <button class="sponsor-close" id="closeSponsorButton" type="button" aria-label="关闭赞助弹窗">×</button>
        <div class="sponsor-copy">
          <span class="sponsor-eyebrow">Support</span>
          <h2>感谢赞助</h2>
          <p>如果这个题库网站帮你省下一点复习时间，可以请 HaBa 喝杯奶茶。</p>
        </div>
        <div class="qr-frame">
          <img src="assets/sponsor-wechat.jpg" alt="微信支付赞助收款码" />
        </div>
        <div class="sponsor-signature">HaBa</div>
      </div>
    </dialog>

    <dialog class="unlock-dialog" id="unlockDialog">
      <form class="unlock-card" id="unlockForm" method="dialog">
        <div class="unlock-mark" aria-hidden="true">🔒</div>
        <h2>解锁题库</h2>
        <p>请输入当前 5 分钟动态口令。若当前网络打不开 workers.dev，也可输入原题库密码离线解锁。</p>
        <label class="unlock-field">
          <span>动态口令</span>
          <input id="unlockPassword" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="请输入 6 位口令" />
        </label>
        <div class="unlock-error" id="unlockError" role="alert" hidden></div>
        <button class="primary-button" id="unlockButton" type="submit">进入题库</button>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
